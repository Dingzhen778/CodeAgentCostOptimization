# LLM Gateway 配置
# 中转站将 Agent 请求路由到廉价 API

# 上游 API（廉价中转站）
upstream_url: "https://api.deepseek.com/v1"
upstream_key: "${DEEPSEEK_API_KEY}"          # 从环境变量读取

default_model: "deepseek-chat"

# 按工具类型路由不同模型（Model Routing 实验）
routing:
  default:    "deepseek-chat"
  read_file:  "deepseek-chat"
  search:     "deepseek-chat"
  bash:       "deepseek-chat"
  edit:       "deepseek-chat"       # Exp4 可换成 claude-3-sonnet
  write_file: "deepseek-chat"

# 日志目录
log_dir: "logs/gateway"

# 服务配置
host: "0.0.0.0"
port: 8080
timeout: 180
